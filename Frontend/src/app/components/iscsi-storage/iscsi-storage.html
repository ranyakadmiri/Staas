<div class="iscsi-root">

  <!-- ── Page header ────────────────────────────────────────────── -->
  <header class="page-header">
    <div class="header-left">
      <div class="header-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
          <circle cx="7" cy="10" r="1" fill="currentColor"/>
          <circle cx="11" cy="10" r="1" fill="currentColor"/>
        </svg>
      </div>
      <div>
        <h1>iSCSI Storage</h1>
        <p class="subtitle">Block storage gateway · ESXi integration</p>
      </div>
    </div>

    <button class="btn-refresh" (click)="loadData()" [disabled]="loadingData">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           [class.spinning]="loadingData">
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/>
      </svg>
      Refresh
    </button>
  </header>

  <!-- ── Toast ──────────────────────────────────────────────────── -->
  <div class="toast" *ngIf="toast" [class.toast--success]="toast.type === 'success'"
       [class.toast--error]="toast.type === 'error'">
    <svg *ngIf="toast.type === 'success'" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    <svg *ngIf="toast.type === 'error'" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
    {{ toast.message }}
  </div>

  <!-- ── Main grid ──────────────────────────────────────────────── -->
  <div class="grid">

    <!-- LEFT COLUMN -->
    <div class="col-left">

      <!-- Create disk form -->
      <section class="panel">
        <div class="panel-header">
          <span class="panel-label">New Disk</span>
        </div>
        <div class="panel-body">
          <div class="field">
            <label class="field-label">Disk Name</label>
            <input
              class="field-input"
              type="text"
              [(ngModel)]="newDiskName"
              placeholder="e.g. esxi-disk-02"
              [disabled]="loadingCreate"
              (keyup.enter)="createDisk()"
            />
          </div>

          <div class="field">
            <label class="field-label">Size</label>
            <div class="size-row">
              <input
                class="field-input size-input"
                type="number"
                [(ngModel)]="newDiskSize"
                min="1"
                max="10240"
                [disabled]="loadingCreate"
              />
              <span class="size-unit">GB</span>
            </div>
          </div>

          <div class="field">
            <label class="field-label">Initiator IQN</label>
            <input
              class="field-input field-input--mono"
              type="text"
              [(ngModel)]="initiatorIqn"
              placeholder="iqn.xxxx..."
              [disabled]="loadingCreate"
            />
          </div>

          <button
            class="btn-create"
            (click)="createDisk()"
            [disabled]="!isFormValid || loadingCreate"
          >
            <span class="btn-create__spinner" *ngIf="loadingCreate">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spinning">
                <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
              </svg>
            </span>
            <svg *ngIf="!loadingCreate" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            {{ loadingCreate ? 'Provisioning...' : 'Create Disk' }}
          </button>
        </div>
      </section>

      <!-- ESXi connection help -->
      <section class="panel panel--esxi" *ngIf="esxiHelp">
        <div class="panel-header">
          <span class="panel-label">ESXi Connection</span>
          <button class="btn-icon" (click)="toggleHelp()">
            {{ showHelp ? '▲' : '▼' }}
          </button>
        </div>
        <div class="panel-body esxi-body" *ngIf="showHelp">
          <pre class="esxi-pre">{{ esxiHelp }}</pre>
        </div>
      </section>

    </div>

    <!-- RIGHT COLUMN -->
    <div class="col-right">

      <!-- Loading skeleton -->
      <div class="skeleton-wrap" *ngIf="loadingData">
        <div class="skeleton-bar" style="width:40%"></div>
        <div class="skeleton-bar" style="width:70%"></div>
        <div class="skeleton-bar" style="width:55%"></div>
        <div class="skeleton-bar" style="width:80%"></div>
      </div>

      <ng-container *ngIf="!loadingData">

        <!-- Targets panel -->
        <section class="panel">
          <div class="panel-header">
            <span class="panel-label">iSCSI Targets</span>
            <span class="panel-badge">{{ parseDiskLines(targets).length }}</span>
          </div>
          <div class="panel-body">
            <div class="empty-state" *ngIf="!targets">
              <span>No targets configured</span>
            </div>
            <div class="disk-list" *ngIf="targets">
              <div class="disk-row" *ngFor="let line of parseDiskLines(targets)">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="disk-icon">
                  <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
                </svg>
                <span class="disk-name">{{ line }}</span>
              </div>
            </div>
          </div>
        </section>

        <!-- Disks panel -->
        <section class="panel">
          <div class="panel-header">
            <span class="panel-label">RBD Disks</span>
            <span class="panel-badge">{{ parseDiskLines(disks).length }}</span>
          </div>
          <div class="panel-body">
            <div class="empty-state" *ngIf="!disks">
              <span>No disks found</span>
            </div>
            <div class="disk-list" *ngIf="disks">
              <div class="disk-row" *ngFor="let line of parseDiskLines(disks)">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="disk-icon">
                  <ellipse cx="12" cy="5" rx="9" ry="3"/>
                  <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                  <path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/>
                </svg>
                <span class="disk-name">{{ line }}</span>
                <div class="disk-actions">
                  <button class="btn-help" (click)="fetchEsxiHelp(line)" title="ESXi connection info">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
                    </svg>
                  </button>
                  <button
                    class="btn-delete"
                    (click)="deleteDisk(line)"
                    [disabled]="deletingDisk === line"
                    title="Delete disk"
                  >
                    <svg *ngIf="deletingDisk !== line" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
                      <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
                    </svg>
                    <svg *ngIf="deletingDisk === line" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spinning">
                      <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>

      </ng-container>
    </div>
  </div>
</div>
