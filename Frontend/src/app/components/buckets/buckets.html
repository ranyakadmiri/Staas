<h2>Buckets</h2>

<div class="create-bucket">
  <div class="form-row">
    <input [(ngModel)]="newBucket.name" placeholder="Bucket name" />
    <button (click)="createBucket()" [disabled]="creating || !newBucket.name">
      {{ creating ? 'Creating...' : 'Create Bucket' }}
    </button>
  </div>

  <div class="quota-toggle">
    <label class="toggle-label">
      <input type="checkbox" [(ngModel)]="newBucket.enableQuota" />
      <span class="toggle-track">
        <span class="toggle-thumb"></span>
      </span>
      Set quota on creation
    </label>
  </div>

  <div class="quota-fields" *ngIf="newBucket.enableQuota">
    <div class="quota-row">
      <div class="quota-field">
        <label>Max Size (GB)</label>
        <input type="number" [(ngModel)]="newBucket.maxSizeGB" min="1" />
      </div>
      <div class="quota-field">
        <label>Max Objects</label>
        <input type="number" [(ngModel)]="newBucket.maxObjects" min="1" />
      </div>
    </div>
  </div>
</div>

<p class="bucket-count">Total buckets: {{ buckets.length }}</p>

<div class="bucket-grid">
  <div class="bucket-card" *ngFor="let bucket of buckets">
    <div class="bucket-icon">🪣</div>
    <h3>{{ bucket }}</h3>
    <button (click)="openBucket(bucket)">Open Bucket</button>
  </div>
</div>
