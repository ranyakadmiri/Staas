<h2>My Credentials</h2>

<table>

<tr>
<th>Access Key</th>
<th>Project</th>
<th>RGW UID</th>
<th>Status</th>
</tr>

<tr *ngFor="let c of credentials">

<td>{{c.accessKey}}</td>

<td>{{c.project.name}}</td>

<td>{{c.rgwUid}}</td>

<td>
<span class="status" [class.active]="c.active">
{{c.active ? 'Active' : 'Disabled'}}
</span>
</td>
</tr>

</table>
