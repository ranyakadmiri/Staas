spring.application.name=demo
# ===============================
# SERVER CONFIG
# ===============================
server.port=8080

# ===============================
# DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/Staas?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# LOGGING (optional)
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# SWAGGER / OPENAPI
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

storage.ssh.host=127.0.0.1
storage.ssh.port=2222
storage.ssh.user=vagrant
storage.ssh.private-key=C:/vagrant/staas-vagrant/.vagrant/machines/ceph-node-1/virtualbox/private_key

storage.cephfs.mount-path=/mnt/cephfs

storage.nfs.server-ip=192.168.100.51
storage.nfs.allowed-clients=192.168.100.0/24
storage.nfs.ganesha-config-path=/etc/ganesha/ganesha.conf
storage.nfs.export-id-start=2000

# Scheduling
spring.task.scheduling.enabled=true

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your@email.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
